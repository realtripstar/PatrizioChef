<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Chaos - Top Down Cooking Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial Black', sans-serif;
        }
        canvas {
            border: 4px solid #ff6b35;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.5);
        }
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 18px;
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 15px 30px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="controls">
        🎮 Xbox: Stick=Muovi | A=Prendi/Posa | X=Taglia | B=Dash<br>
        ⌨️ Tastiera: WASD/Frecce=Muovi | Spazio=Prendi | X=Taglia | Shift=Dash
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Responsive canvas
        const GAME_WIDTH = 1280;
        const GAME_HEIGHT = 720;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        // Audio Context
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'pickup') {
                osc.frequency.value = 440;
                osc.type = 'square';
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'complete') {
                osc.frequency.value = 523;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                osc.start();
                setTimeout(() => {
                    osc.frequency.value = 659;
                }, 100);
                setTimeout(() => {
                    osc.frequency.value = 784;
                }, 200);
                osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'burn') {
                osc.frequency.value = 150;
                osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // Game State
        const game = {
            score: 0,
            time: 180,
            particles: [],
            orders: [],
            stations: [],
            ingredients: [],
            plates: []
        };

        // Chef
        const chef = {
            x: GAME_WIDTH / 2,
            y: GAME_HEIGHT / 2,
            radius: 25,
            speed: 5,
            vx: 0,
            vy: 0,
            holding: null,
            bobPhase: 0,
            rotation: 0,
            isDashing: false,
            dashTime: 0,
            dashCooldown: 0,
            cuttingProgress: 0,
            isCutting: false,
            facingAngle: 0
        };

        // Input
        const keys = {};
        const gamepadState = {
            leftStickX: 0,
            leftStickY: 0,
            buttonA: false,
            buttonAPressed: false,
            buttonX: false,
            buttonXPressed: false,
            buttonB: false,
            buttonBPressed: false
        };

        // Ingredient Types
        const INGREDIENTS = {
            BREAD: { name: 'Pane', color: '#DEB887', needsCut: true, needsCook: false },
            MEAT_RAW: { name: 'Carne Cruda', color: '#8B4513', needsCut: false, needsCook: true },
            MEAT_COOKED: { name: 'Carne Cotta', color: '#654321', needsCut: false, needsCook: false },
            MEAT_BURNED: { name: 'Carne Bruciata', color: '#1a1a1a', needsCut: false, needsCook: false },
            TOMATO: { name: 'Pomodoro', color: '#FF6347', needsCut: true, needsCook: false }
        };

        // Station Types
        const STATION_TYPES = {
            INGREDIENT_BREAD: 'bread_source',
            INGREDIENT_MEAT: 'meat_source',
            INGREDIENT_TOMATO: 'tomato_source',
            CUTTING_BOARD: 'cutting',
            STOVE: 'stove',
            PLATE_STATION: 'plate',
            DELIVERY: 'delivery'
        };

        // Initialize Stations
        function initStations() {
            const counterWidth = 80;
            const counterHeight = 80;
            
            // Top counters (ingredient sources)
            game.stations.push({
                x: 100, y: 60, width: counterWidth, height: counterHeight,
                type: STATION_TYPES.INGREDIENT_BREAD, label: '🍞'
            });
            game.stations.push({
                x: 250, y: 60, width: counterWidth, height: counterHeight,
                type: STATION_TYPES.INGREDIENT_MEAT, label: '🥩'
            });
            game.stations.push({
                x: 400, y: 60, width: counterWidth, height: counterHeight,
                type: STATION_TYPES.INGREDIENT_TOMATO, label: '🍅'
            });
            
            // Right side - Stoves
            game.stations.push({
                x: GAME_WIDTH - 140, y: 150, width: counterWidth, height: counterHeight,
                type: STATION_TYPES.STOVE, label: '🔥', item: null, cookTime: 0
            });
            game.stations.push({
                x: GAME_WIDTH - 140, y: 280, width: counterWidth, height: counterHeight,
                type: STATION_TYPES.STOVE, label: '🔥', item: null, cookTime: 0
            });
            
            // Left side - Cutting boards
            game.stations.push({
                x: 60, y: 200, width: counterWidth, height: counterHeight,
                type: STATION_TYPES.CUTTING_BOARD, label: '🔪', item: null
            });
            game.stations.push({
                x: 60, y: 330, width: counterWidth, height: counterHeight,
                type: STATION_TYPES.CUTTING_BOARD, label: '🔪', item: null
            });
            
            // Bottom - Plate station
            game.stations.push({
                x: 300, y: GAME_HEIGHT - 140, width: counterWidth, height: counterHeight,
                type: STATION_TYPES.PLATE_STATION, label: '🍽️'
            });
            
            // Bottom - Delivery (conveyor belt)
            game.stations.push({
                x: GAME_WIDTH - 200, y: GAME_HEIGHT - 140, width: 150, height: counterHeight,
                type: STATION_TYPES.DELIVERY, label: '📦 CONSEGNA', plate: null
            });

            // Additional counters for decoration
            for (let i = 550; i < GAME_WIDTH - 200; i += 90) {
                game.stations.push({
                    x: i, y: 60, width: counterWidth, height: counterHeight,
                    type: 'counter', label: ''
                });
            }
        }

        // Generate Order
        function generateOrder() {
            const order = {
                id: Date.now(),
                ingredients: ['BREAD', 'MEAT_COOKED', 'TOMATO'],
                timeLeft: 60,
                x: 100 + game.orders.length * 200
            };
            game.orders.push(order);
        }

        // Particle System
        function createParticles(x, y, count, colors) {
            for (let i = 0; i < count; i++) {
                game.particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10 - 5,
                    life: 1,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    size: Math.random() * 8 + 4
                });
            }
        }

        // Draw Checkered Floor
        function drawFloor() {
            const tileSize = 60;
            for (let x = 0; x < GAME_WIDTH; x += tileSize) {
                for (let y = 0; y < GAME_HEIGHT; y += tileSize) {
                    const isLight = ((x / tileSize) + (y / tileSize)) % 2 === 0;
                    ctx.fillStyle = isLight ? '#87CEEB' : '#5DADE2';
                    ctx.fillRect(x, y, tileSize, tileSize);
                }
            }
        }

        // Draw Station
        function drawStation(station) {
            // Counter base
            ctx.fillStyle = '#FF8C00';
            ctx.strokeStyle = '#CC7000';
            ctx.lineWidth = 4;
            ctx.fillRect(station.x, station.y, station.width, station.height);
            ctx.strokeRect(station.x, station.y, station.width, station.height);
            
            // Counter top shine
            ctx.fillStyle = '#FFA500';
            ctx.fillRect(station.x + 5, station.y + 5, station.width - 10, 15);
            
            // Station label
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#FFF';
            ctx.fillText(station.label, station.x + station.width/2, station.y + station.height/2 + 10);
            
            // Draw item on station if any
            if (station.item) {
                drawIngredient(station.x + station.width/2, station.y + station.height/2 - 15, station.item, 15);
                
                // Cook progress for stove
                if (station.type === STATION_TYPES.STOVE && station.item.type === 'MEAT_RAW') {
                    const progress = station.cookTime / 5;
                    ctx.fillStyle = '#333';
                    ctx.fillRect(station.x + 10, station.y - 15, station.width - 20, 10);
                    ctx.fillStyle = progress < 1 ? '#4CAF50' : '#FF5722';
                    ctx.fillRect(station.x + 10, station.y - 15, (station.width - 20) * Math.min(progress, 1.5), 10);
                }
            }
            
            // Delivery station plate
            if (station.type === STATION_TYPES.DELIVERY && station.plate) {
                drawPlate(station.x + station.width/2, station.y + station.height/2, station.plate);
            }
        }

        // Draw Ingredient
        function drawIngredient(x, y, ingredient, radius = 20) {
            const type = INGREDIENTS[ingredient.type] || INGREDIENTS.BREAD;
            
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = type.color;
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Tomato green dot
            if (ingredient.type === 'TOMATO') {
                ctx.beginPath();
                ctx.arc(x, y - radius/2, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#228B22';
                ctx.fill();
            }
            
            // Cut indicator
            if (ingredient.isCut) {
                ctx.strokeStyle = '#FFF';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x - radius/2, y);
                ctx.lineTo(x + radius/2, y);
                ctx.stroke();
            }
        }

        // Draw Plate
        function drawPlate(x, y, plate) {
            // Plate base
            ctx.beginPath();
            ctx.arc(x, y, 35, 0, Math.PI * 2);
            ctx.fillStyle = '#FFF';
            ctx.fill();
            ctx.strokeStyle = '#CCC';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Inner ring
            ctx.beginPath();
            ctx.arc(x, y, 25, 0, Math.PI * 2);
            ctx.strokeStyle = '#DDD';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw ingredients on plate
            if (plate.ingredients && plate.ingredients.length > 0) {
                const angleStep = (Math.PI * 2) / Math.max(plate.ingredients.length, 3);
                plate.ingredients.forEach((ing, i) => {
                    const ix = x + Math.cos(angleStep * i - Math.PI/2) * 12;
                    const iy = y + Math.sin(angleStep * i - Math.PI/2) * 12;
                    drawIngredient(ix, iy, ing, 10);
                });
            }
        }

        // Draw Chef
        function drawChef() {
            const bobOffset = Math.sin(chef.bobPhase) * 3;
            const tiltAngle = Math.sin(chef.bobPhase * 0.5) * 0.1;
            
            ctx.save();
            ctx.translate(chef.x, chef.y);
            ctx.rotate(tiltAngle);
            
            // Shadow
            ctx.beginPath();
            ctx.ellipse(0, chef.radius - 5, chef.radius * 0.8, chef.radius * 0.3, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fill();
            
            // Body (white apron)
            ctx.beginPath();
            ctx.arc(0, bobOffset, chef.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#FFF';
            ctx.fill();
            ctx.strokeStyle = '#DDD';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Head (pink)
            ctx.beginPath();
            ctx.arc(0, -chef.radius * 0.5 + bobOffset, chef.radius * 0.6, 0, Math.PI * 2);
            ctx.fillStyle = '#FFB6C1';
            ctx.fill();
            ctx.strokeStyle = '#FF69B4';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Eyes
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(-6, -chef.radius * 0.5 + bobOffset - 2, 3, 0, Math.PI * 2);
            ctx.arc(6, -chef.radius * 0.5 + bobOffset - 2, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Chef hat
            ctx.fillStyle = '#FFF';
            ctx.strokeStyle = '#DDD';
            ctx.lineWidth = 2;
            
            // Hat base
            ctx.fillRect(-15, -chef.radius - 10 + bobOffset, 30, 10);
            ctx.strokeRect(-15, -chef.radius - 10 + bobOffset, 30, 10);
            
            // Hat puff
            ctx.beginPath();
            ctx.arc(-8, -chef.radius - 20 + bobOffset, 12, 0, Math.PI * 2);
            ctx.arc(8, -chef.radius - 20 + bobOffset, 12, 0, Math.PI * 2);
            ctx.arc(0, -chef.radius - 25 + bobOffset, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            ctx.restore();
            
            // Held item
            if (chef.holding) {
                if (chef.holding.type === 'plate') {
                    drawPlate(chef.x + 30, chef.y - 20, chef.holding);
                } else {
                    drawIngredient(chef.x + 30, chef.y - 20, chef.holding, 18);
                }
            }
            
            // Cutting progress bar
            if (chef.isCutting) {
                ctx.fillStyle = '#333';
                ctx.fillRect(chef.x - 30, chef.y - 60, 60, 12);
                ctx.fillStyle = '#4CAF50';
                ctx.fillRect(chef.x - 28, chef.y - 58, 56 * chef.cuttingProgress, 8);
            }
            
            // Dash effect
            if (chef.isDashing) {
                ctx.globalAlpha = 0.5;
                for (let i = 1; i <= 3; i++) {
                    ctx.beginPath();
                    ctx.arc(chef.x - chef.vx * i * 5, chef.y - chef.vy * i * 5, chef.radius * (1 - i * 0.2), 0, Math.PI * 2);
                    ctx.fillStyle = '#87CEEB';
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }
        }

        // Draw Orders
        function drawOrders() {
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fillRect(0, 0, GAME_WIDTH, 50);
            
            ctx.font = 'bold 24px Arial';
            ctx.fillStyle = '#FFF';
            ctx.textAlign = 'left';
            ctx.fillText('ORDINI:', 20, 35);
            
            game.orders.forEach((order, index) => {
                const orderX = 150 + index * 220;
                
                // Order box
                ctx.fillStyle = order.timeLeft < 15 ? '#FF4444' : '#333';
                ctx.fillRect(orderX, 5, 200, 40);
                ctx.strokeStyle = '#FFF';
                ctx.lineWidth = 2;
                ctx.strokeRect(orderX, 5, 200, 40);
                
                // Ingredients icons
                order.ingredients.forEach((ing, i) => {
                    const iconX = orderX + 30 + i * 50;
                    drawIngredient(iconX, 25, { type: ing, isCut: true }, 12);
                });
                
                // Timer
                ctx.font = 'bold 16px Arial';
                ctx.fillStyle = order.timeLeft < 15 ? '#FF0' : '#FFF';
                ctx.textAlign = 'right';
                ctx.fillText(Math.ceil(order.timeLeft) + 's', orderX + 190, 30);
            });
        }

        // Draw UI
        function drawUI() {
            // Score
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(GAME_WIDTH - 200, 60, 190, 50);
            ctx.font = 'bold 28px Arial';
            ctx.fillStyle = '#FFD700';
            ctx.textAlign = 'right';
            ctx.fillText('💰 ' + game.score, GAME_WIDTH - 20, 95);
            
            // Timer
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(GAME_WIDTH - 200, 115, 190, 50);
            ctx.fillStyle = game.time < 30 ? '#FF4444' : '#FFF';
            ctx.fillText('⏱️ ' + Math.ceil(game.time), GAME_WIDTH - 20, 150);
            
            // Gamepad indicator
            const gamepads = navigator.getGamepads();
            const hasGamepad = Array.from(gamepads).some(gp => gp !== null);
            ctx.font = '20px Arial';
            ctx.fillStyle = hasGamepad ? '#4CAF50' : '#666';
            ctx.textAlign = 'left';
            ctx.fillText(hasGamepad ? '🎮 Connesso' : '🎮 Non connesso', 20, GAME_HEIGHT - 20);
        }

        // Draw Particles
        function drawParticles() {
            game.particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
            });
            ctx.globalAlpha = 1;
        }

        // Update Particles
        function updateParticles(dt) {
            game.particles = game.particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3; // gravity
                p.life -= dt * 2;
                return p.life > 0;
            });
        }

        // Get nearest station
        function getNearestStation() {
            let nearest = null;
            let minDist = 100;
            
            game.stations.forEach(station => {
                const dx = (station.x + station.width/2) - chef.x;
                const dy = (station.y + station.height/2) - chef.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < minDist) {
                    minDist = dist;
                    nearest = station;
                }
            });
            return nearest;
        }

        // Handle pickup/drop (A button)
        function handlePickupDrop() {
            initAudio();
            const station = getNearestStation();
            if (!station) return;
            
            // Ingredient sources
            if (station.type === STATION_TYPES.INGREDIENT_BREAD && !chef.holding) {
                chef.holding = { type: 'BREAD', isCut: false };
                playSound('pickup');
            } else if (station.type === STATION_TYPES.INGREDIENT_MEAT && !chef.holding) {
                chef.holding = { type: 'MEAT_RAW', isCut: false };
                playSound('pickup');
            } else if (station.type === STATION_TYPES.INGREDIENT_TOMATO && !chef.holding) {
                chef.holding = { type: 'TOMATO', isCut: false };
                playSound('pickup');
            }
            // Plate station
            else if (station.type === STATION_TYPES.PLATE_STATION && !chef.holding) {
                chef.holding = { type: 'plate', ingredients: [] };
                playSound('pickup');
            }
            // Cutting board
            else if (station.type === STATION_TYPES.CUTTING_BOARD) {
                if (chef.holding && !station.item && chef.holding.type !== 'plate') {
                    station.item = chef.holding;
                    chef.holding = null;
                    playSound('pickup');
                } else if (!chef.holding && station.item) {
                    chef.holding = station.item;
                    station.item = null;
                    playSound('pickup');
                }
            }
            // Stove
            else if (station.type === STATION_TYPES.STOVE) {
                if (chef.holding && chef.holding.type === 'MEAT_RAW' && !station.item) {
                    station.item = chef.holding;
                    station.cookTime = 0;
                    chef.holding = null;
                    playSound('pickup');
                } else if (!chef.holding && station.item) {
                    chef.holding = station.item;
                    station.item = null;
                    station.cookTime = 0;
                    playSound('pickup');
                }
            }
            // Delivery
            else if (station.type === STATION_TYPES.DELIVERY) {
                if (chef.holding && chef.holding.type === 'plate' && chef.holding.ingredients.length > 0) {
                    // Check order
                    checkDelivery(chef.holding);
                    chef.holding = null;
                } else if (chef.holding && chef.holding.type === 'plate') {
                    station.plate = chef.holding;
                    chef.holding = null;
                }
            }
            // Add to plate
            else if (chef.holding && chef.holding.type === 'plate') {
                // Check nearby stations for completed items
                game.stations.forEach(s => {
                    if (s.item && s.item.isCut && chef.holding.ingredients.length < 3) {
                        const dx = (s.x + s.width/2) - chef.x;
                        const dy = (s.y + s.height/2) - chef.y;
                        if (Math.sqrt(dx*dx + dy*dy) < 100) {
                            chef.holding.ingredients.push(s.item);
                            s.item = null;
                            playSound('pickup');
                        }
                    }
                    // Cooked meat from stove
                    if (s.type === STATION_TYPES.STOVE && s.item && 
                        (s.item.type === 'MEAT_COOKED' || s.item.type === 'MEAT_BURNED') &&
                        chef.holding.ingredients.length < 3) {
                        const dx = (s.x + s.width/2) - chef.x;
                        const dy = (s.y + s.height/2) - chef.y;
                        if (Math.sqrt(dx*dx + dy*dy) < 100) {
                            s.item.isCut = true; // Mark as ready
                            chef.holding.ingredients.push(s.item);
                            s.item = null;
                            s.cookTime = 0;
                            playSound('pickup');
                        }
                    }
                });
            }
        }

        // Handle cut/interact (X button)
        function handleCut() {
            initAudio();
            const station = getNearestStation();
            if (!station || station.type !== STATION_TYPES.CUTTING_BOARD) return;
            if (!station.item || station.item.isCut) return;
            
            chef.isCutting = true;
        }

        // Handle dash (B button)
        function handleDash() {
            if (chef.dashCooldown <= 0 && (chef.vx !== 0 || chef.vy !== 0)) {
                chef.isDashing = true;
                chef.dashTime = 0.5;
                chef.dashCooldown = 1.5;
            }
        }

        // Check delivery
        function checkDelivery(plate) {
            if (game.orders.length === 0) return;
            
            const order = game.orders[0];
            const plateTypes = plate.ingredients.map(i => {
                if (i.type === 'MEAT_COOKED') return 'MEAT_COOKED';
                return i.type;
            }).sort();
            const orderTypes = [...order.ingredients].sort();
            
            const matches = plateTypes.length === orderTypes.length &&
                plateTypes.every((type, i) => type === orderTypes[i]);
            
            if (matches) {
                game.score += 100 + Math.floor(order.timeLeft) * 2;
                game.orders.shift();
                createParticles(GAME_WIDTH - 125, GAME_HEIGHT - 100, 50, 
                    ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD']);
                playSound('complete');
                
                // Generate new order
                if (game.orders.length < 3) {
                    setTimeout(() => generateOrder(), 1000);
                }
            } else {
                // Wrong order penalty
                game.score = Math.max(0, game.score - 25);
            }
        }

        // Update cooking
        function updateCooking(dt) {
            game.stations.forEach(station => {
                if (station.type === STATION_TYPES.STOVE && station.item) {
                    if (station.item.type === 'MEAT_RAW') {
                        station.cookTime += dt;
                        if (station.cookTime >= 5 && station.cookTime < 8) {
                            station.item.type = 'MEAT_COOKED';
                        } else if (station.cookTime >= 8) {
                            if (station.item.type !== 'MEAT_BURNED') {
                                station.item.type = 'MEAT_BURNED';
                                playSound('burn');
                            }
                        }
                    }
                }
            });
        }

        // Update cutting
        function updateCutting(dt) {
            if (chef.isCutting) {
                const station = getNearestStation();
                if (station && station.type === STATION_TYPES.CUTTING_BOARD && station.item && !station.item.isCut) {
                    chef.cuttingProgress += dt * 0.8;
                    if (chef.cuttingProgress >= 1) {
                        station.item.isCut = true;
                        chef.isCutting = false;
                        chef.cuttingProgress = 0;
                        playSound('pickup');
                    }
                } else {
                    chef.isCutting = false;
                    chef.cuttingProgress = 0;
                }
            }
        }

        // Update chef
        function updateChef(dt) {
            // Get input
            let moveX = 0, moveY = 0;
            
            // Keyboard
            if (keys['ArrowLeft'] || keys['KeyA']) moveX -= 1;
            if (keys['ArrowRight'] || keys['KeyD']) moveX += 1;
            if (keys['ArrowUp'] || keys['KeyW']) moveY -= 1;
            if (keys['ArrowDown'] || keys['KeyS']) moveY += 1;
            
            // Gamepad
            if (Math.abs(gamepadState.leftStickX) > 0.2) moveX = gamepadState.leftStickX;
            if (Math.abs(gamepadState.leftStickY) > 0.2) moveY = gamepadState.leftStickY;
            
            // Normalize
            const len = Math.sqrt(moveX * moveX + moveY * moveY);
            if (len > 0) {
                moveX /= len;
                moveY /= len;
            }
            
            // Apply speed
            let speed = chef.speed;
            if (chef.isDashing) {
                speed *= 3;
                chef.dashTime -= dt;
                if (chef.dashTime <= 0) {
                    chef.isDashing = false;
                }
            }
            
            chef.vx = moveX * speed;
            chef.vy = moveY * speed;
            
            // Update position
            chef.x += chef.vx;
            chef.y += chef.vy;
            
            // Bounds
            chef.x = Math.max(chef.radius + 60, Math.min(GAME_WIDTH - chef.radius - 60, chef.x));
            chef.y = Math.max(chef.radius + 120, Math.min(GAME_HEIGHT - chef.radius - 60, chef.y));
            
            // Animation
            if (len > 0) {
                chef.bobPhase += dt * 15;
                chef.facingAngle = Math.atan2(moveY, moveX);
            }
            
            // Dash cooldown
            if (chef.dashCooldown > 0) {
                chef.dashCooldown -= dt;
            }
        }

        // Update orders
        function updateOrders(dt) {
            game.orders = game.orders.filter(order => {
                order.timeLeft -= dt;
                return order.timeLeft > 0;
            });
            
            // Generate new orders
            if (game.orders.length < 2 && Math.random() < dt * 0.1) {
                generateOrder();
            }
        }

        // Poll gamepad
        function pollGamepad() {
            const gamepads = navigator.getGamepads();
            const gp = gamepads[0];
            
            if (gp) {
                gamepadState.leftStickX = gp.axes[0] || 0;
                gamepadState.leftStickY = gp.axes[1] || 0;
                
                // A button (index 0)
                const aPressed = gp.buttons[0].pressed;
                if (aPressed && !gamepadState.buttonA) {
                    handlePickupDrop();
                }
                gamepadState.buttonA = aPressed;
                
                // X button (index 2)
                const xPressed = gp.buttons[2].pressed;
                if (xPressed && !gamepadState.buttonX) {
                    handleCut();
                }
                gamepadState.buttonX = xPressed;
                
                // B button (index 1)
                const bPressed = gp.buttons[1].pressed;
                if (bPressed && !gamepadState.buttonB) {
                    handleDash();
                }
                gamepadState.buttonB = bPressed;
            }
        }

        // Main game loop
        let lastTime = 0;
        function gameLoop(timestamp) {
            const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;
            
            // Poll gamepad
            pollGamepad();
            
            // Update
            if (!chef.isCutting) {
                updateChef(dt);
            }
            updateCooking(dt);
            updateCutting(dt);
            updateOrders(dt);
            updateParticles(dt);
            
            game.time -= dt;
            
            // Draw
            drawFloor();
            game.stations.forEach(drawStation);
            drawChef();
            drawParticles();
            drawOrders();
            drawUI();
            
            // Game over check
            if (game.time <= 0) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                ctx.font = 'bold 72px Arial';
                ctx.fillStyle = '#FFD700';
                ctx.textAlign = 'center';
                ctx.fillText('TEMPO SCADUTO!', GAME_WIDTH/2, GAME_HEIGHT/2 - 50);
                ctx.font = 'bold 48px Arial';
                ctx.fillText('Punteggio: ' + game.score, GAME_WIDTH/2, GAME_HEIGHT/2 + 30);
                ctx.font = '28px Arial';
                ctx.fillStyle = '#FFF';
                ctx.fillText('Premi SPAZIO o A per ricominciare', GAME_WIDTH/2, GAME_HEIGHT/2 + 100);
                
                if (keys['Space'] || gamepadState.buttonA) {
                    resetGame();
                }
            } else {
                requestAnimationFrame(gameLoop);
            }
        }

        // Reset game
        function resetGame() {
            game.score = 0;
            game.time = 180;
            game.orders = [];
            game.particles = [];
            chef.x = GAME_WIDTH / 2;
            chef.y = GAME_HEIGHT / 2;
            chef.holding = null;
            chef.isCutting = false;
            chef.cuttingProgress = 0;
            
            // Clear stations
            game.stations.forEach(s => {
                if (s.item) s.item = null;
                if (s.cookTime) s.cookTime = 0;
                if (s.plate) s.plate = null;
            });
            
            generateOrder();
            generateOrder();
            
            requestAnimationFrame(gameLoop);
        }

        // Input handlers
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            
            if (e.code === 'Space') {
                handlePickupDrop();
            } else if (e.code === 'KeyX') {
                handleCut();
            } else if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
                handleDash();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
            if (e.code === 'KeyX') {
                chef.isCutting = false;
                chef.cuttingProgress = 0;
            }
        });

        // Gamepad connected
        window.addEventListener('gamepadconnected', (e) => {
            console.log('Gamepad connesso:', e.gamepad.id);
        });

        // Initialize
        initStations();
        generateOrder();
        generateOrder();
        requestAnimationFrame(gameLoop);
    </script>
</body>
