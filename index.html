<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chef Patrizio - Xbox Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px black; font-size: 24px; z-index: 10; }
        #controls { position: absolute; bottom: 20px; right: 20px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="ui">PUNTEGGIO: <span id="score">0</span> | LIVELLO 1: BURGER</div>
    <div id="controls">A: Prendi | X: Taglia | B: Scatto</div>

    <script>
        // Inizializzazione Scena
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Azzurro cielo

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Luci (Fondamentali per vedere i colori)
        const light = new THREE.AmbientLight(0xffffff, 1);
        scene.add(light);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Pavimento a scacchi
        const floorGeo = new THREE.PlaneGeometry(20, 20);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0xeeeeee });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Creazione Chef (Modello Chibi a sfere)
        const chef = new THREE.Group();
        
        const body = new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 32), new THREE.MeshPhongMaterial({color: 0xffffff}));
        body.position.y = 0.7;
        chef.add(body);

        const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), new THREE.MeshPhongMaterial({color: 0xffdbac}));
        head.position.y = 1.5;
        chef.add(head);

        const hat = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.5), new THREE.MeshPhongMaterial({color: 0xffffff}));
        hat.position.y = 2;
        chef.add(hat);

        scene.add(chef);

        // Creazione Banchi (Arancioni)
        function createCounter(x, z, color = 0xffa500) {
            const geo = new THREE.BoxGeometry(1.5, 1, 1.5);
            const mat = new THREE.MeshPhongMaterial({color: color});
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, 0.5, z);
            scene.add(mesh);
        }

        // Layout Cucina
        for(let i = -4; i <= 4; i+=2) {
            createCounter(i, -4); // Fila dietro
            createCounter(i, 4);  // Fila davanti
        }

        // Movimento (Tastiera + predisposizione Gamepad)
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);

            // Logica movimento fluido
            const speed = 0.15;
            if (keys['ArrowUp'] || keys['KeyW']) chef.position.z -= speed;
            if (keys['ArrowDown'] || keys['KeyS']) chef.position.z += speed;
            if (keys['ArrowLeft'] || keys['KeyA']) chef.position.x -= speed;
            if (keys['ArrowRight'] || keys['KeyD']) chef.position.x += speed;

            // Effetto rimbalzo camminata
            if(keys['ArrowUp'] || keys['KeyW'] || keys['ArrowLeft'] || keys['KeyA'] || keys['ArrowRight'] || keys['KeyD'] || keys['ArrowDown'] || keys['KeyS']) {
                chef.position.y = Math.abs(Math.sin(Date.now() * 0.01)) * 0.2;
            }

            renderer.render(scene, camera);
        }

        // Adattamento schermo
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
