<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chibi Kitchen Xbox</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: Arial; overflow: hidden; }
        #gui { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 10; font-size: 20px; text-shadow: 2px 2px #000; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="gui">LIVELLO 1: BURGER | PUNTI: <span id="punti">0</span> | TEMPO: <span id="timer">3:00</span></div>
    
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

    <script>
        // Controllo se la libreria è caricata
        window.onload = function() {
            if (typeof THREE === 'undefined') {
                document.getElementById('gui').innerHTML = "ERRORE: Libreria non caricata. Ricarica la pagina.";
                return;
            }

            // 1. SCENA E CAMERA
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Azzurro Cielo

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 10);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 2. LUCI (Se non ci sono, vedi tutto nero!)
            const ambientLight = new THREE.AmbientLight(0xffffff, 1);
            scene.add(ambientLight);
            const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
            sunLight.position.set(5, 10, 7);
            scene.add(sunLight);

            // 3. PAVIMENTO
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(20, 20),
                new THREE.MeshPhongMaterial({ color: 0x333333 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // 4. LO CHEF (Fatto con sfere per essere fluido)
            const chef = new THREE.Group();
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), new THREE.MeshPhongMaterial({color: 0xffffff}));
            body.position.y = 0.6;
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshPhongMaterial({color: 0xffdbac}));
            head.position.y = 1.3;
            const hat = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.4), new THREE.MeshPhongMaterial({color: 0xffffff}));
            hat.position.y = 1.8;
            chef.add(body, head, hat);
            scene.add(chef);

            // 5. BANCHI CUCINA (Arancioni e visibili)
            function creaBanco(x, z) {
                const b = new THREE.Mesh(
                    new THREE.BoxGeometry(1.5, 1, 1.5),
                    new THREE.MeshPhongMaterial({ color: 0xffa500 })
                );
                b.position.set(x, 0.5, z);
                scene.add(b);
            }
            // Layout a U
            for(let i=-3; i<=3; i+=2) creaBanco(i, -3); // Dietro
            creaBanco(-3, 0); creaBanco(3, 0); // Lati

            // 6. MOVIMENTO
            let vel = { x: 0, z: 0 };
            window.addEventListener('keydown', (e) => {
                if(e.key === 'ArrowUp' || e.key === 'w') vel.z = -0.15;
                if(e.key === 'ArrowDown' || e.key === 's') vel.z = 0.15;
                if(e.key === 'ArrowLeft' || e.key === 'a') vel.x = -0.15;
                if(e.key === 'ArrowRight' || e.key === 'd') vel.x = 0.15;
            });
            window.addEventListener('keyup', (e) => {
                if(['ArrowUp','ArrowDown','w','s'].includes(e.key)) vel.z = 0;
                if(['ArrowLeft','ArrowRight','a','d'].includes(e.key)) vel.x = 0;
            });

            // ANIMAZIONE
            function animate() {
                requestAnimationFrame(animate);
                chef.position.x += vel.x;
                chef.position.z += vel.z;
                
                // Limiti pavimento
                chef.position.x = Math.max(-9, Math.min(9, chef.position.x));
                chef.position.z = Math.max(-9, Math.min(9, chef.position.z));

                renderer.render(scene, camera);
            }
            animate();

            // Adattamento schermo
            window.onresize = function() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
